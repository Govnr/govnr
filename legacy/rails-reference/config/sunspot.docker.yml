production:
  solr:
    hostname: <%= ENV.fetch("SOLR_HOST", "solr") %>
    port: <%= ENV.fetch("SOLR_PORT", "8983") %>
    log_level: WARNING
    path: /solr/production

development:
  solr:
    hostname: <%= ENV.fetch("SOLR_HOST", "solr") %>
    port: <%= ENV.fetch("SOLR_PORT", "8983") %>
    log_level: INFO
    path: /solr/development

test:
  solr:
    hostname: <%= ENV.fetch("SOLR_HOST", "solr") %>
    port: <%= ENV.fetch("SOLR_PORT", "8983") %>
    log_level: WARNING
    path: /solr/test

